<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swimmy Timmy Rafting Company</title>
    <meta name="description" content="Leave your number and contact information">
    <meta name="author" content="Timothy Klintsov">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-boat.png" alt="logo of the page">
        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- 🔥 ОБЪЕДИНЕННЫЙ БЛОК -->
        <section class="contact-section">

            <!-- LEFT -->
            <div class="contact-left">
                <h2>Contact Information</h2>

                <address>
                    <p>123 Main Street Colob, California</p>
                    <p>Phone: <a href="tel:+19998887777">+1 999 888 7777</a></p>
                    <p>Email: <a
                          href="mailto:timothyklintsov@gmail.com">timothyklintsov@gmail.com</a></p>
                </address>

                <div class="contact-map">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d73703.39999861289!2d-61.22225003149927!3d-2.1299817688523235!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sru!2sge!4v1775283981145!5m2!1sru!2sge"
                      loading="lazy">
                    </iframe>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="contact-form">
                <form>

                    <h2>Contact Us</h2>

                    <label>Name</label>
                    <input type="text" placeholder="Your Name" required>

                    <label>Email</label>
                    <input type="email" placeholder="you@example.com" required>

                    <label>Message Purpose</label>
                    <div class="radio-group">
                        <label><input type="radio" name="purpose" required> General Inquiry</label>
                        <label><input type="radio" name="purpose"> Reservation Question</label>
                        <label><input type="radio" name="purpose"> Website Suggestion</label>
                    </div>

                    <label>Message</label>
                    <textarea rows="4" placeholder="Your message..." required></textarea>

                    <div class="checkbox">
                        <input type="checkbox">
                        <label>Subscribe to newsletter</label>
                    </div>

                    <button type="submit">Get in Touch</button>

                </form>
            </div>

        </section>

        <!-- TEAM -->
        <section class="team">
            <h2>Our Team</h2>

            <div class="team-container">
                <div class="employee">
                    <img src="images/employee1.jpg">
                    <h3>Valeria Doss</h3>
                </div>
                <div class="employee">
                    <img src="images/employe3.jpg">
                    <h3>Edvard Muchin</h3>
                </div>
                <div class="employee">
                    <img src="images/employe4.webp">
                    <h3>Kayla Brock</h3>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 | Swimmy Timmy | Timothy Klintsov</p>

            <a href="https://www.facebook.com/profile.php?id=100013354022077">
                <img class="icon" src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://www.instagram.com/timoha_klin/">
                <img class="icon" src="images/insta.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
