<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Swimmy Timmy | Book Your Rafting Adventure Today</title>
    <meta name="description"
      content="Ready for an adventure? Contact Swimmy Timmy Rafting Co. for bookings, trip inquiries, and expert advice. Start your whitewater rafting journey today!">
    <meta name="author" content="Timothy Klintsov">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/hero.png" alt="logo of the page">
        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">

            <div class="contact-left">
                <h1>Contact Information</h1>

                <address>
                    <p>123 Main Street Colob, California</p>
                    <p>Phone: <a href="tel:+19998887777">+1 999 888 7777</a></p>
                    <p>Email: <a
                          href="mailto:timothyklintsov@gmail.com">timothyklintsov@gmail.com</a></p>
                </address>
            </div>
        </section>


        <div class="contact-container">
            <section class="contact-map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d73703.39999861289!2d-61.22225003149927!3d-2.1299817688523235!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sru!2sge!4v1775283981145!5m2!1sru!2sge"
                  loading="lazy">
                </iframe>
            </section>


            <section class="contact-form">
                <h2>Contact Us</h2>
                <form action="#" method="post">


                    <div class="form-question">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your Name" required>
                    </div>

                    <!-- Email -->
                    <div class="form-question">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com"
                          required>
                    </div>


                    <div class="form-question">
                        <label>Message Purpose</label>
                        <div class="radio-group">
                            <input type="radio" id="general" name="purpose" value="General Inquiry"
                              required>
                            <label for="general">General Inquiry</label>

                            <input type="radio" id="reservation" name="purpose"
                              value="Reservation Question">
                            <label for="reservation">Reservation Question</label>

                            <input type="radio" id="website" name="purpose"
                              value="Website Suggestion">
                            <label for="website">Website Suggestion</label>
                        </div>
                    </div>


                    <div class="form-question">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="4"
                          placeholder="Your message here..." required></textarea>
                    </div>


                    <div class="form-question checkbox">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        <label for="subscribe">Subscribe to our monthly newsletter</label>
                    </div>


                    <div class="form-question">
                        <button type="submit">Get in Touch</button>
                    </div>
                </form>
            </section>
        </div>


        <section class="team">
            <h2>Our Team</h2>

            <div class="team-container">
                <div class="employee">
                    <img src="images/employee1.jpg" alt="Valeria Doss">
                    <h3>Valeria Doss</h3>
                </div>
                <div class="employee">
                    <img src="images/employe3.jpg" alt="Edvard Muchin">
                    <h3>Edvard Muchin</h3>
                </div>
                <div class="employee">
                    <img src="images/employe4.webp" alt="Couch Kayla">
                    <h3>Kayla Brock</h3>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 | Swimmy Timmy | Timothy Klintsov</p>
        <nav class="socialmedia">
            <a href="https://www.linkedin.com/in/timothy-klintsov-044992391/">
                <img class="icon" src="images/linkedin.png" alt="Linkedin Icon">
            </a>
            <a href="https://www.facebook.com/profile.php?id=100013354022077">
                <img class="icon" src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://www.instagram.com/timoha_klin/">
                <img class="icon" src="images/insta.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
