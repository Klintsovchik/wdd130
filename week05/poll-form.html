<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/poll_form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form User Poll</h1>
    </header>
    <form action="">
        <label for="fullname">Full name:</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="useremail">Email:</label>
        <input type="email" id="useremail" name="useremail" required>

        <label for="browsers">What is your favorite browser?"</label>
        <select name="browsers" id="browsers">
            <option value="chrome">Chrome</option>
            <option value="firefox">Firefox</option>
            <option value="edge">Edge</option>
            <option value="brave">Brave</option>
            <option value="other">Other</option>
        </select>

        <label for="pet">Do you have your favorite pet?</label>
        <input type="checkbox" id="pet" name="pet">

        <label for="feedback">List the places you have lived:</label>
        <textarea name="feedback" id="feedback" rows="4"
          placeholder="Stillwater Florida, Amsterdam Netherlands, Timbuktu Mali"></textarea>
        <button>Submit Poll</button>


    </form>
</body>

</html>
